[paths]
root = "<PROJECT_ROOT>/skills"
codex_home = "<CODEX_HOME>"
config_path = "<CODEX_HOME>/config.toml"
skills_dir = "<CODEX_HOME>/skills"
cloud_dir = "<PROJECT_ROOT>/skills/cloud"

[obsidian]
vault_path = "<YOUR_OBSIDIAN_VAULT>"
vault_subdir = "Codex Research"
sync_export_dir = "<PROJECT_ROOT>/outputs/reports/obsidian-sync"

[plugin_marketplace]
path = "<PROJECT_ROOT>/skills/.agents/plugins/marketplace.json"
home_path = "<CODEX_HOME>/.agents/plugins/marketplace.json"

[global_route_rules]
language = "zh-CN"
role = "world-class-doctoral-supervisor"
require_realtime_verification = true
formal_citation_requires_doi = true
forbid_unverified_references = true
forbid_ai_hallucinated_citations = true
data_paragraph_framework = "PEEL"
