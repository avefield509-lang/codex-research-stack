<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081517"/>
      <stop offset="100%" stop-color="#102933"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#031012" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1280" height="820" fill="url(#bg)"/>
  <rect x="48" y="42" width="1184" height="736" rx="32" fill="#0D1F23" stroke="#24474C" filter="url(#shadow)"/>
  <text x="88" y="108" fill="#F5F3EB" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Research Team Orchestrator</text>
  <text x="88" y="146" fill="#A7C3BD" font-size="24" font-family="Segoe UI, Arial, sans-serif">A project task becomes a real squad, not a conversation pretending to be a squad.</text>

  <rect x="88" y="192" width="206" height="128" rx="24" fill="#153B41"/>
  <text x="114" y="232" fill="#9CC2BA" font-size="18" font-family="Segoe UI, Arial, sans-serif">PRODUCER</text>
  <text x="114" y="272" fill="#F6F4EA" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Literature Agent</text>
  <text x="114" y="302" fill="#E5BE67" font-size="20" font-family="Segoe UI, Arial, sans-serif">discovery → synthesis</text>

  <rect x="342" y="192" width="206" height="128" rx="24" fill="#153B41"/>
  <text x="368" y="232" fill="#9CC2BA" font-size="18" font-family="Segoe UI, Arial, sans-serif">PRODUCER</text>
  <text x="368" y="272" fill="#F6F4EA" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Writing Agent</text>
  <text x="368" y="302" fill="#E5BE67" font-size="20" font-family="Segoe UI, Arial, sans-serif">draft → export</text>

  <rect x="596" y="192" width="206" height="128" rx="24" fill="#153B41"/>
  <text x="622" y="232" fill="#9CC2BA" font-size="18" font-family="Segoe UI, Arial, sans-serif">MANAGER</text>
  <text x="622" y="272" fill="#F6F4EA" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Project Manager</text>
  <text x="622" y="302" fill="#E5BE67" font-size="20" font-family="Segoe UI, Arial, sans-serif">state → milestones</text>

  <rect x="850" y="192" width="342" height="128" rx="24" fill="#E5BE67"/>
  <text x="876" y="232" fill="#16323A" font-size="18" font-family="Segoe UI, Arial, sans-serif">REVIEW CHAIN</text>
  <text x="876" y="272" fill="#16323A" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Reviewer Agent</text>
  <text x="876" y="302" fill="#16323A" font-size="20" font-family="Segoe UI, Arial, sans-serif">target-specific gate · no direct write to primary artifact</text>

  <path d="M294 256h36" stroke="#7FB1A8" stroke-width="4"/>
  <path d="M548 256h36" stroke="#7FB1A8" stroke-width="4"/>
  <path d="M802 256h36" stroke="#7FB1A8" stroke-width="4"/>

  <rect x="88" y="384" width="540" height="330" rx="26" fill="#11282C" stroke="#24474C"/>
  <text x="118" y="428" fill="#F6F4EA" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Canonical runtime artifacts</text>
  <rect x="118" y="460" width="220" height="48" rx="24" fill="#20484D"/>
  <text x="146" y="491" fill="#F6F4EA" font-size="20" font-family="Segoe UI, Arial, sans-serif">dispatch card</text>
  <rect x="356" y="460" width="240" height="48" rx="24" fill="#20484D"/>
  <text x="384" y="491" fill="#F6F4EA" font-size="20" font-family="Segoe UI, Arial, sans-serif">context packets</text>
  <rect x="118" y="526" width="260" height="48" rx="24" fill="#20484D"/>
  <text x="146" y="557" fill="#F6F4EA" font-size="20" font-family="Segoe UI, Arial, sans-serif">agent output dirs</text>
  <rect x="394" y="526" width="202" height="48" rx="24" fill="#20484D"/>
  <text x="422" y="557" fill="#F6F4EA" font-size="20" font-family="Segoe UI, Arial, sans-serif">handoff log</text>
  <rect x="118" y="592" width="180" height="48" rx="24" fill="#20484D"/>
  <text x="146" y="623" fill="#F6F4EA" font-size="20" font-family="Segoe UI, Arial, sans-serif">gate log</text>
  <rect x="316" y="592" width="280" height="48" rx="24" fill="#20484D"/>
  <text x="344" y="623" fill="#F6F4EA" font-size="20" font-family="Segoe UI, Arial, sans-serif">project state board</text>
  <text x="118" y="680" fill="#A8C4BE" font-size="21" font-family="Segoe UI, Arial, sans-serif">Every handoff lands in a visible file path. Every review decision leaves a trace.</text>

  <rect x="658" y="384" width="534" height="330" rx="26" fill="#11282C" stroke="#24474C"/>
  <text x="688" y="428" fill="#F6F4EA" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Project state and quality gates</text>
  <rect x="688" y="462" width="476" height="74" rx="18" fill="#18353A"/>
  <text x="714" y="492" fill="#9CC2BA" font-size="17" font-family="Segoe UI, Arial, sans-serif">CURRENT OWNER</text>
  <text x="714" y="522" fill="#F6F4EA" font-size="24" font-family="Segoe UI, Arial, sans-serif">Project Manager Agent → keeps route, stage, blockers, milestones aligned</text>
  <rect x="688" y="554" width="224" height="110" rx="18" fill="#18353A"/>
  <text x="714" y="586" fill="#9CC2BA" font-size="17" font-family="Segoe UI, Arial, sans-serif">NEXT GATES</text>
  <text x="714" y="620" fill="#F6F4EA" font-size="22" font-family="Segoe UI, Arial, sans-serif">citation integrity</text>
  <text x="714" y="648" fill="#F6F4EA" font-size="22" font-family="Segoe UI, Arial, sans-serif">writing quality</text>
  <rect x="938" y="554" width="226" height="110" rx="18" fill="#18353A"/>
  <text x="964" y="586" fill="#9CC2BA" font-size="17" font-family="Segoe UI, Arial, sans-serif">BLOCK RULE</text>
  <text x="964" y="620" fill="#F6F4EA" font-size="22" font-family="Segoe UI, Arial, sans-serif">No next handoff if</text>
  <text x="964" y="648" fill="#E5BE67" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">gate != pass</text>
