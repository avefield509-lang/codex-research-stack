<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>可选集成 · VELA</title>
    <meta name="description" content="VELA 科研工作流环境的可选集成。">
    <link rel="stylesheet" href="../assets/site.css">
  </head>
  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="brand"><span class="brand-mark"></span><span>VELA</span></div>
        <div class="lang-switch"><a href="../integrations.html">English</a><span class="active">简体中文</span></div>
      </div>
      <section class="hero compact">
        <div>
          <div class="eyebrow">可选集成</div>
          <h1><span class="sans">增强可以接入，边界必须清楚。</span></h1>
          <p>VELA 可以与 Codex、HELM、Python、Zotero、Obsidian 和分析工具配合，但任何工具都不能把草稿静默变成事实，也不能让工作流依赖某个 app 才成立。</p>
        </div>
      </section>
      <section class="section grid-3">
        <article class="card"><h3>Codex</h3><p>接收有范围的交接上下文，执行研究、代码、分析或文档任务。</p></article>
        <article class="card"><h3>HELM</h3><p>作为独立本地看板读取项目状态，展示证据、交付物、环境健康和交接准备度。</p></article>
        <article class="card"><h3>研究工具</h3><p>Python、Zotero、Obsidian、notebook 和统计工具都是增强层，不是基础工作流前提。</p></article>
      </section>
    </main>
  </body>
</html>
