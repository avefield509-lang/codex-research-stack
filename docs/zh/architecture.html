    <meta name="description" content="VELA 的可移植项目状态架构。">
    <link rel="stylesheet" href="../assets/site.css">
  </head>
  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="brand"><span class="brand-mark"></span><span>VELA</span></div>
        <div class="lang-switch"><a href="../architecture.html">English</a><span class="active">简体中文</span></div>
      </div>
      <section class="hero">
        <div>
          <div class="eyebrow">架构</div>
          <h1><span class="sans">可移植项目状态优先。</span></h1>
          <p>VELA 把工作流保留在可检查的项目文件中：材料、证据、主张、方法说明、交付物和 Codex 交接上下文。</p>
        </div>
        <div class="hero-visual"><img src="../assets/brand/vela-helm-design-language-reference.png" alt="VELA 设计语言"></div>

        <article class="card"><h3>项目状态</h3><p>事实来源应保持可移植，并且在任何单一 app 之外也能被理解。</p></article>
        <article class="card"><h3>证据生命周期</h3><p>材料、证据、主张和产物保持区分，满足复核字段后才进入下一层。</p></article>
        <article class="card"><h3>交接上下文</h3><p>Codex 接收有边界的任务：文件、约束、预期输出和已知缺口必须明确。</p></article>
