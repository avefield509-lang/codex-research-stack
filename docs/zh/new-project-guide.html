<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新项目指南 · VELA</title>
    <meta name="description" content="使用 VELA 创建新的科研项目。">
    <link rel="stylesheet" href="../assets/site.css">
  </head>
  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="brand"><span class="brand-mark"></span><span>VELA</span></div>
        <div class="lang-switch"><a href="../new-project-guide.html">English</a><span class="active">简体中文</span></div>
      </div>
      <section class="hero compact">
        <div>
          <div class="eyebrow">新项目</div>
          <h1><span class="sans">先建立证据路径。</span></h1>
          <p>新的 VELA 项目从问题、材料、方法预期、证据规则和交接约定开始。可见路径比快速生成任何产物更重要。</p>
        </div>
      </section>
      <section class="section grid-4">
        <article class="card"><h3>问题</h3><p>定义项目范围和预期交付物。</p></article>
        <article class="card"><h3>材料</h3><p>保存来源线索，但不夸大其证据状态。</p></article>
        <article class="card"><h3>证据</h3><p>核验来源、访问时间、权利、伦理和支持关系。</p></article>
        <article class="card"><h3>交接</h3><p>为 Codex 或 HELM 准备有边界的上下文。</p></article>
      </section>
    </main>
