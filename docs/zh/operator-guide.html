  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="brand"><span class="brand-mark"></span><span>VELA</span></div>
        <div class="lang-switch"><a href="../operator-guide.html">English</a><span class="active">简体中文</span></div>
      </div>
      <section class="hero compact">
        <div>
          <div class="eyebrow">操作指南</div>
          <h1><span class="sans">保持项目状态真实。</span></h1>
          <p>VELA 的使用关键是保持边界：材料不是证据，候选主张不是发现，生成建议在复核前不是项目事实。</p>
        </div>
      </section>
      <section class="section grid-3">
        <article class="card"><h3>捕获</h3><p>低摩擦保存来源线索，包括 DOI、URL、文件路径、数据集、平台材料、政策报告、田野笔记或手动笔记。</p></article>
        <article class="card"><h3>核验</h3><p>只有补齐来源、访问时间、核验状态和权利或伦理说明后，材料才进入证据层。</p></article>
        <article class="card"><h3>交接</h3><p>给 Codex 的任务必须有边界：相关文件、约束、预期输出和已知缺口都要明确。</p></article>
      </section>
    </main>
