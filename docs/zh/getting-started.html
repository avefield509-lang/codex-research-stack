<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>快速开始 · VELA</title>
    <meta name="description" content="开始使用 VELA 科研工作流环境。">
    <link rel="stylesheet" href="../assets/site.css">
  </head>
  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="brand"><span class="brand-mark"></span><span>VELA</span></div>
        <div class="lang-switch">
          <a href="../getting-started.html">English</a>
          <span class="active">简体中文</span>
        </div>
      </div>
      <section class="hero">
        <div>
          <div class="eyebrow">快速开始</div>
          <h1><span class="sans">先建立可信项目状态。</span></h1>
          <p>创建真实项目文件夹，保存材料，只把完成核验字段的材料升级为证据，再为 Codex 准备有边界的上下文交接。HELM 可以把这些状态显示在看板里，但 VELA 不依赖 HELM。</p>
          <div class="hero-actions">
            <a class="button button-primary" href="../installation.html">安装说明</a>
            <a class="button" href="./">返回首页</a>
          </div>
        </div>
        <div class="hero-visual symbol">
          <img src="../assets/brand/vela-workflow-mark.png" alt="VELA 分层帆形标志">
        </div>
      </section>
      <section class="section">
        <div class="grid-3">
          <article class="card"><h3>1. 定义</h3><p>在可移植项目文件中记录问题、范围、来源边界和预期交付物。</p></article>
          <article class="card"><h3>2. 追踪</h3><p>区分材料与证据。证据必须包含来源、访问时间、核验状态和权利或伦理说明。</p></article>
          <article class="card"><h3>3. 交接</h3><p>给 Codex 的上下文必须包含任务、相关文件、约束、预期输出和已知缺口。</p></article>
        </div>
      </section>
    </main>
  </body>
</html>
