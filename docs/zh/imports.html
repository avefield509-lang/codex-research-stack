<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VELA 与 HELM 导入接口</title>
    <meta name="description" content="VELA 与 HELM 之间的文件型导入接口。">
    <link rel="stylesheet" href="../assets/site.css">
  </head>
  <body>
    <main class="page-shell">
      <div class="topbar">
        <div class="brand"><span class="brand-mark"></span><span>VELA</span></div>
        <div class="lang-switch"><a href="../">概览</a><a href="../imports.html">English</a></div>
      </div>
      <section class="hero compact">
        <div>
          <div class="eyebrow">导入接口</div>
          <h1><span class="sans">显式本地文件，不做隐藏耦合。</span></h1>
          <p>VELA 与 HELM 保持独立。组合使用时，只通过研究项目内的小型、可检查 JSON 包交换状态。</p>
          <div class="hero-actions">
            <a class="button button-primary" href="../imports/vela-helm-interface.md">查看契约</a>
            <a class="button" href="https://github.com/Marcus-AI4SS/HELM">打开 HELM</a>
          </div>
        </div>
      </section>
      <section class="section grid-2">
        <article class="card"><h3>VELA 到 HELM</h3><p><code>vela.project.context.v1</code> 让 HELM 导入路径、状态、证据计数、交付物、环境健康和交接准备度。</p></article>
        <article class="card"><h3>HELM 到 VELA</h3><p><code>helm.codex.handoff.v1</code> 让 VELA 把 HELM 准备的 Codex 交接包存入 <code>handoffs/</code>，用于复核和继续工作。</p></article>
      </section>
    </main>
  </body>
</html>
