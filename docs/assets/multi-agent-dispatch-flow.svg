<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Multi-agent dispatch board">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071217"/>
      <stop offset="1" stop-color="#0d2026"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="84" y="96" fill="#eaf5f2" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Dispatch board</text>
  <text x="86" y="140" fill="#b6cbc7" font-family="Segoe UI, Arial, sans-serif" font-size="24">Real multi-agent work leaves separate inputs, outputs, reviewers, and project state.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="96" y="216" width="248" height="360" rx="28" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="128" y="268" fill="#69d3c9" font-size="28" font-weight="700">Producer</text>
    <text x="128" y="318" fill="#f0faf7" font-size="26">Literature agent</text>
    <text x="128" y="370" fill="#b6cbc7" font-size="22">Input</text>
    <text x="128" y="404" fill="#f0faf7" font-size="24">review question</text>
    <text x="128" y="462" fill="#b6cbc7" font-size="22">Output</text>
    <text x="128" y="496" fill="#f0faf7" font-size="24">candidate map</text>
    <rect x="390" y="216" width="248" height="360" rx="28" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="422" y="268" fill="#69d3c9" font-size="28" font-weight="700">Reviewer</text>
    <text x="422" y="318" fill="#f0faf7" font-size="26">Quality gate</text>
    <text x="422" y="370" fill="#b6cbc7" font-size="22">Checks</text>
    <text x="422" y="404" fill="#f0faf7" font-size="24">citations</text>
    <text x="422" y="438" fill="#f0faf7" font-size="24">method fit</text>
    <text x="422" y="496" fill="#e2b45d" font-size="26" font-weight="700">revise if weak</text>
    <rect x="684" y="216" width="248" height="360" rx="28" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="716" y="268" fill="#69d3c9" font-size="28" font-weight="700">Outputs</text>
    <text x="716" y="318" fill="#f0faf7" font-size="26">summary.md</text>
    <text x="716" y="356" fill="#f0faf7" font-size="26">result.json</text>
    <text x="716" y="426" fill="#b6cbc7" font-size="22">stored in</text>
    <text x="716" y="462" fill="#f0faf7" font-size="24">agent output dir</text>
    <rect x="978" y="216" width="206" height="360" rx="28" fill="#312718" stroke="#8b6a29" stroke-width="2"/>
    <text x="1010" y="268" fill="#e2b45d" font-size="28" font-weight="700">State</text>
    <text x="1010" y="318" fill="#f0faf7" font-size="26">current.json</text>
    <text x="1010" y="372" fill="#b6cbc7" font-size="22">who owns</text>
    <text x="1010" y="406" fill="#b6cbc7" font-size="22">what next</text>
    <text x="1010" y="440" fill="#b6cbc7" font-size="22">what blocks</text>
  </g>
  <path d="M344 396 H390 M638 396 H684 M932 396 H978" stroke="#69d3c9" stroke-width="5" stroke-linecap="round"/>
</svg>
