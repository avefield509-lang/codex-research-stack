<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Research material layers">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071217"/>
      <stop offset="1" stop-color="#102229"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="84" y="96" fill="#eaf5f2" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Research materials stay separated</text>
  <text x="86" y="140" fill="#b6cbc7" font-family="Segoe UI, Arial, sans-serif" font-size="24">The project does not collapse references, notes, evidence, and outputs into one chat.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="118" y="226" width="1044" height="96" rx="26" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="158" y="286" fill="#69d3c9" font-size="30" font-weight="700">Codex workspace</text>
    <text x="466" y="286" fill="#f0faf7" font-size="26">route, execute, explain, review</text>
    <rect x="118" y="354" width="1044" height="96" rx="26" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="158" y="414" fill="#69d3c9" font-size="30" font-weight="700">Project files</text>
    <text x="466" y="414" fill="#f0faf7" font-size="26">rules, state, findings, gates</text>
    <rect x="118" y="482" width="314" height="116" rx="26" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="154" y="530" fill="#69d3c9" font-size="28" font-weight="700">Zotero</text>
    <text x="154" y="568" fill="#f0faf7" font-size="24">verified references</text>
    <rect x="484" y="482" width="314" height="116" rx="26" fill="#102b33" stroke="#376b6b" stroke-width="2"/>
    <text x="520" y="530" fill="#69d3c9" font-size="28" font-weight="700">Obsidian</text>
    <text x="520" y="568" fill="#f0faf7" font-size="24">long-lived notes</text>
    <rect x="850" y="482" width="312" height="116" rx="26" fill="#312718" stroke="#8b6a29" stroke-width="2"/>
    <text x="886" y="530" fill="#e2b45d" font-size="28" font-weight="700">Evidence vault</text>
    <text x="886" y="568" fill="#f0faf7" font-size="24">visible sources</text>
  </g>
  <path d="M640 322 V354 M640 450 V482" stroke="#69d3c9" stroke-width="5" stroke-linecap="round"/>
</svg>
