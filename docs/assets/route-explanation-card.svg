<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Route explanation product card">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071217"/>
      <stop offset="1" stop-color="#102229"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#102a31"/>
      <stop offset="1" stop-color="#0b1e25"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="90" cy="90" r="240" fill="#69d3c9" opacity=".10"/>
  <circle cx="1120" cy="620" r="250" fill="#e2b45d" opacity=".10"/>
  <text x="84" y="96" fill="#eaf5f2" font-family="Bahnschrift, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Route explanation card</text>
  <text x="86" y="140" fill="#b6cbc7" font-family="Segoe UI, Arial, sans-serif" font-size="24">Before execution, the system tells the researcher what path it will take and why.</text>
  <rect x="112" y="210" width="1056" height="400" rx="34" fill="url(#card)" stroke="#336364" stroke-width="2"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="158" y="264" width="272" height="116" rx="22" fill="#14343b" stroke="#376f6e"/>
    <text x="188" y="306" fill="#69d3c9" font-size="22" font-weight="700">Task type</text>
    <text x="188" y="344" fill="#f0faf7" font-size="30" font-weight="700">Literature review</text>
    <rect x="504" y="264" width="272" height="116" rx="22" fill="#14343b" stroke="#376f6e"/>
    <text x="534" y="306" fill="#69d3c9" font-size="22" font-weight="700">Selected path</text>
    <text x="534" y="344" fill="#f0faf7" font-size="30" font-weight="700">Discover → Verify</text>
    <rect x="850" y="264" width="272" height="116" rx="22" fill="#312718" stroke="#8b6a29"/>
    <text x="880" y="306" fill="#e2b45d" font-size="22" font-weight="700">Blocked risks</text>
    <text x="880" y="344" fill="#f0faf7" font-size="30" font-weight="700">Unverified DOI</text>
    <rect x="158" y="438" width="964" height="94" rx="24" fill="#0b1c22" stroke="#2b5556"/>
    <text x="188" y="477" fill="#e2b45d" font-size="22" font-weight="700">Next action</text>
    <text x="188" y="512" fill="#f0faf7" font-size="28">Create a project scaffold, verify sources, then decide whether to dispatch specialist agents.</text>
  </g>
</svg>
