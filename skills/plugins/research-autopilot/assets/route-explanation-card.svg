<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091719"/>
      <stop offset="100%" stop-color="#10252A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#021012" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1280" height="820" fill="url(#bg)"/>
  <rect x="54" y="46" width="1172" height="728" rx="30" fill="#0D1F23" stroke="#214247" filter="url(#shadow)"/>
  <circle cx="94" cy="90" r="8" fill="#E2735F"/>
  <circle cx="122" cy="90" r="8" fill="#E2B15F"/>
  <circle cx="150" cy="90" r="8" fill="#6CB38A"/>
  <text x="196" y="98" fill="#A3C0BA" font-size="18" font-family="Segoe UI, Arial, sans-serif">research-autopilot / route explanation card</text>

  <text x="86" y="156" fill="#F5F3EB" font-size="40" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Research task is explained before anything runs</text>
  <text x="86" y="196" fill="#A9C4BE" font-size="24" font-family="Segoe UI, Arial, sans-serif">The plugin makes route, profile, scope, gates, and next action visible first.</text>

  <rect x="86" y="242" width="280" height="122" rx="22" fill="#143A40"/>
  <text x="112" y="278" fill="#9CC0B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">ROUTE</text>
  <text x="112" y="320" fill="#F7F4EA" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">literature-review</text>
  <text x="112" y="350" fill="#E5BE67" font-size="20" font-family="Segoe UI, Arial, sans-serif">conditional multi-agent</text>

  <rect x="394" y="242" width="250" height="122" rx="22" fill="#143A40"/>
  <text x="420" y="278" fill="#9CC0B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">PROFILE</text>
  <text x="420" y="320" fill="#F7F4EA" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">literature</text>
  <text x="420" y="350" fill="#E5BE67" font-size="20" font-family="Segoe UI, Arial, sans-serif">discovery + sync</text>

  <rect x="672" y="242" width="508" height="122" rx="22" fill="#143A40"/>
  <text x="698" y="278" fill="#9CC0B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">WHY THIS ROUTE</text>
  <text x="698" y="318" fill="#F7F4EA" font-size="24" font-family="Segoe UI, Arial, sans-serif">Discovery, DOI verification, synthesis, and Zotero / Obsidian handoff</text>
  <text x="698" y="348" fill="#BFD3CE" font-size="20" font-family="Segoe UI, Arial, sans-serif">appear together in the request, so the stack upgrades into project planning.</text>

  <rect x="86" y="404" width="532" height="302" rx="24" fill="#11282C" stroke="#214247"/>
  <text x="116" y="446" fill="#F5F3EB" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Selected components</text>
  <rect x="116" y="480" width="188" height="44" rx="22" fill="#20484D"/>
  <text x="142" y="509" fill="#F5F3EB" font-size="20" font-family="Segoe UI, Arial, sans-serif">cnki-research</text>
  <rect x="318" y="480" width="208" height="44" rx="22" fill="#20484D"/>
  <text x="344" y="509" fill="#F5F3EB" font-size="20" font-family="Segoe UI, Arial, sans-serif">citation-verifier</text>
  <rect x="116" y="540" width="170" height="44" rx="22" fill="#20484D"/>
  <text x="142" y="569" fill="#F5F3EB" font-size="20" font-family="Segoe UI, Arial, sans-serif">zotero-sync</text>
  <rect x="302" y="540" width="214" height="44" rx="22" fill="#20484D"/>
  <text x="328" y="569" fill="#F5F3EB" font-size="20" font-family="Segoe UI, Arial, sans-serif">research-team-orchestrator</text>
  <text x="118" y="636" fill="#A8C3BE" font-size="21" font-family="Segoe UI, Arial, sans-serif">No retrieval starts until the route card is visible.</text>
  <text x="118" y="668" fill="#A8C3BE" font-size="21" font-family="Segoe UI, Arial, sans-serif">No formal citation enters the chain before DOI validation.</text>

  <rect x="646" y="404" width="534" height="302" rx="24" fill="#11282C" stroke="#214247"/>
  <text x="676" y="446" fill="#F5F3EB" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">What happens next</text>
  <path d="M706 502h414" stroke="#30565B" stroke-width="2"/>
  <circle cx="710" cy="502" r="10" fill="#E5BE67"/>
  <text x="740" y="510" fill="#F5F3EB" font-size="22" font-family="Segoe UI, Arial, sans-serif">Generate clarification card</text>
  <circle cx="710" cy="560" r="10" fill="#E5BE67"/>
  <text x="740" y="568" fill="#F5F3EB" font-size="22" font-family="Segoe UI, Arial, sans-serif">Check project-scope upgrade rule</text>
  <circle cx="710" cy="618" r="10" fill="#E5BE67"/>
  <text x="740" y="626" fill="#F5F3EB" font-size="22" font-family="Segoe UI, Arial, sans-serif">Only then bootstrap dispatch + review chain</text>
  <rect x="676" y="646" width="318" height="36" rx="18" fill="#20484D"/>
  <text x="700" y="670" fill="#9CC0B8" font-size="18" font-family="Segoe UI, Arial, sans-serif">safe by default · readable by default</text>
</svg>
