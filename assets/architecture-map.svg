<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F3EC"/>
      <stop offset="100%" stop-color="#E9EFEA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7F938E" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>
  <text x="80" y="98" fill="#0D3A3E" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Codex Research Stack</text>
  <text x="80" y="144" fill="#45635E" font-size="24" font-family="Segoe UI, Arial, sans-serif">Control plane, squad orchestration, quality gates, and knowledge handoff in one research system.</text>

  <rect x="80" y="198" width="1240" height="148" rx="30" fill="#11343A" filter="url(#shadow)"/>
  <text x="118" y="244" fill="#8FB8B0" font-size="18" font-family="Segoe UI, Arial, sans-serif">CONTROL PLANE</text>
  <text x="118" y="292" fill="#F7F4EA" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700">research-autopilot</text>
  <text x="118" y="326" fill="#C7D9D4" font-size="22" font-family="Segoe UI, Arial, sans-serif">Chooses route, profile, helper skills, and whether the task upgrades into project-type orchestration.</text>

  <rect x="80" y="390" width="598" height="250" rx="28" fill="#FFFFFF" stroke="#CBD8D3" filter="url(#shadow)"/>
  <text x="116" y="434" fill="#0D3A3E" font-size="18" font-family="Segoe UI, Arial, sans-serif">SQUAD LAYER</text>
  <text x="116" y="478" fill="#0D3A3E" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">research-team-orchestrator</text>
  <text x="116" y="516" fill="#476560" font-size="21" font-family="Segoe UI, Arial, sans-serif">Turns route logic into a readable squad: producer selection, reviewer mapping, dispatch card, and project-state board.</text>
  <rect x="116" y="552" width="170" height="44" rx="22" fill="#E7BF66"/>
  <text x="142" y="581" fill="#0F2B31" font-size="20" font-family="Segoe UI, Arial, sans-serif">dispatch card</text>
  <rect x="302" y="552" width="168" height="44" rx="22" fill="#E7BF66"/>
  <text x="328" y="581" fill="#0F2B31" font-size="20" font-family="Segoe UI, Arial, sans-serif">review chain</text>
  <rect x="486" y="552" width="150" height="44" rx="22" fill="#E7BF66"/>
  <text x="512" y="581" fill="#0F2B31" font-size="20" font-family="Segoe UI, Arial, sans-serif">project state</text>

  <rect x="722" y="390" width="598" height="250" rx="28" fill="#FFFFFF" stroke="#CBD8D3" filter="url(#shadow)"/>
  <text x="758" y="434" fill="#0D3A3E" font-size="18" font-family="Segoe UI, Arial, sans-serif">EXECUTION LAYER</text>
  <text x="758" y="478" fill="#0D3A3E" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Producer and reviewer agents</text>
  <text x="758" y="516" fill="#476560" font-size="21" font-family="Segoe UI, Arial, sans-serif">Literature, social evidence, analysis, writing, and reviewer roles operate inside explicit path and review contracts.</text>
  <rect x="758" y="552" width="178" height="44" rx="22" fill="#E7BF66"/>
  <text x="784" y="581" fill="#0F2B31" font-size="20" font-family="Segoe UI, Arial, sans-serif">literature agent</text>
  <rect x="952" y="552" width="198" height="44" rx="22" fill="#E7BF66"/>
  <text x="978" y="581" fill="#0F2B31" font-size="20" font-family="Segoe UI, Arial, sans-serif">platform evidence</text>
  <rect x="1166" y="552" width="120" height="44" rx="22" fill="#E7BF66"/>
  <text x="1192" y="581" fill="#0F2B31" font-size="20" font-family="Segoe UI, Arial, sans-serif">writer</text>

  <rect x="80" y="684" width="1240" height="208" rx="30" fill="#FFFFFF" stroke="#CBD8D3" filter="url(#shadow)"/>
  <text x="118" y="728" fill="#0D3A3E" font-size="18" font-family="Segoe UI, Arial, sans-serif">GATES + KNOWLEDGE LAYER</text>
  <text x="118" y="770" fill="#0D3A3E" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Quality gates protect the handoff</text>
  <text x="118" y="808" fill="#476560" font-size="22" font-family="Segoe UI, Arial, sans-serif">Citation integrity, writing quality, reproducibility, and freeze gates sit between execution and the final knowledge layer.</text>
  <text x="118" y="852" fill="#476560" font-size="21" font-family="Segoe UI, Arial, sans-serif">Outputs then move into Zotero, Obsidian, project artifacts, and publication-ready materials.</text>

  <path d="M700 346v28" stroke="#7EA9A0" stroke-width="4" stroke-dasharray="10 10"/>
  <path d="M700 640v28" stroke="#7EA9A0" stroke-width="4" stroke-dasharray="10 10"/>
</svg>
